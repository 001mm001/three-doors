<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸运门小游戏</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft YaHei",sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
    font-size:42px;
    text-shadow:0 0 15px #38bdf8;
}

.info{
    width:300px;
    margin:20px auto;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    font-size:26px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

#money{
    color:#facc15;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    gap:50px;
    margin-top:60px;
    flex-wrap:wrap;
}

.door{
    width:170px;
    height:250px;
    border-radius:20px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#6b3f00,#b56a00,#6b3f00);
    border:4px solid #fbbf24;
    box-shadow:0 10px 25px rgba(0,0,0,.5);
    transition:.3s;
}

.door:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px orange,0 0 60px rgba(255,165,0,.4);
}

button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.log{
    width:80%;
    max-width:700px;
    margin:30px auto;
    padding:20px;
    min-height:120px;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,.3);
    font-size:20px;
    line-height:1.8;
}

</style>
</head>

<body>

<h1>🎯 幸运门小游戏</h1>

<div class="info">
总金币：<span id="money">0</span>
</div>

<div class="container">
    <div class="door" onclick="openDoor('A',event)">A</div>
    <div class="door" onclick="openDoor('B',event)">B</div>
    <div class="door" onclick="openDoor('C',event)">C</div>
</div>

<button onclick="restart()">重新开始</button>

<div class="log" id="log">
点击一扇门开始游戏
</div>

<script>

let money = 0;

let luckyDoor =
["A","B","C"][Math.floor(Math.random()*3)];

function openDoor(door,event){

    let reward;

    if(door === luckyDoor){
        reward = Math.floor(Math.random()*51)+50;
    }else{
        reward = Math.floor(Math.random()*20)+1;
    }

    money += reward;

    document.getElementById("money").innerText = money;

    document.getElementById("log").innerHTML =
    `
    你打开了 ${door} 门<br>
    获得金币：${reward}<br>
    当前总金币：${money}
    `;

    event.target.animate(
    [
        {transform:"scale(1)"},
        {transform:"scale(1.15)"},
        {transform:"scale(1)"}
    ],
    {
        duration:300
    });

}

function restart(){

    money = 0;

    document.getElementById("money").innerText = 0;

    luckyDoor =
    ["A","B","C"][Math.floor(Math.random()*3)];

    document.getElementById("log").innerHTML =
    "游戏已重新开始，请选择一扇门。";

}

</script>

</body>
</html>
